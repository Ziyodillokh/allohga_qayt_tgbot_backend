name: Deploy Backend

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build check
        run: |
          npm ci || npm install
          npm run build

      - name: Copy backend files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "src/,package.json,package-lock.json,tsconfig.json,tsconfig.build.json,nest-cli.json,Dockerfile,migrations/"
          target: /root/ziyodullo/backend
          overwrite: true

      - name: Rebuild backend container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 300s
          script: |
            set -e
            echo "=== Backend deploy boshlandi ==="
            cd /root/ziyodullo

            # Run pending migrations
            docker compose exec -T postgres psql -U postgres -d tavba \
              -c "ALTER TABLE test_attempts ADD COLUMN IF NOT EXISTS \"questionIds\" text NOT NULL DEFAULT '';" \
              2>/dev/null || echo "Migration skipped or already applied"

            # Rebuild backend container
            echo "=== Docker rebuild ==="
            docker compose stop backend
            docker compose rm -f backend
            docker compose build --no-cache backend
            docker compose up -d backend

            # Wait for healthy
            echo "Waiting for backend to start..."
            sleep 30
            docker compose ps backend
            docker compose logs backend --tail=20
            echo "=== Backend deploy tugadi ==="
