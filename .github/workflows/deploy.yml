name: Deploy Backend

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and build check
        run: |
          npm ci || npm install
          npm run build
        env:
          CI: true

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            set -e
            echo "=== Backend deploy boshlandi ==="

            # Pull latest code from GitHub
            cd /root/ziydullo/backend
            git fetch origin main
            git reset --hard origin/main

            # Run migration if postgres is running
            cd /root/ziydullo
            docker compose exec -T postgres psql -U postgres -d bilimdon -c "ALTER TABLE test_attempts ADD COLUMN IF NOT EXISTS \"questionIds\" text NOT NULL DEFAULT '';" || echo "Migration skipped or already applied"

            echo "=== Docker rebuild ==="
            docker compose stop backend
            docker compose rm -f backend
            docker compose build --no-cache backend
            docker compose up -d backend

            # Wait for healthy
            echo "Waiting for backend to start..."
            sleep 30
            docker compose ps backend
            docker compose logs backend --tail=20

            echo "=== Backend deploy tugadi ==="
